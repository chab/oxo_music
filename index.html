<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="We build plugins we want to use.">
    <title>OXO-Music | Music Plugins</title>
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <header class="site-header">
    <div class="container nav-wrap">
      <a class="logo" href="./" aria-label="OXO-Music home">O X O</a>
      <nav class="site-nav" aria-label="Primary navigation">
        <a class="active" href="./">Home</a>
        <a href="#products">Products</a>
        <a href="support/">Support</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="product-detail home-detail" aria-labelledby="home-title">
      <div class="product-hero">
        <div class="product-hero-main">
          <h1 id="home-title">We build plugins we want to use.</h1>
          <p class="hero-meta">Made for our workflow, shared with yours.</p>
        </div>
      </div>

      <section class="product-content home-content" id="products" aria-labelledby="products-heading">
        <article class="detail-block detail-block-main">
          <h2 id="products-heading">Products</h2>

          <div class="product-grid">
            <a class="product-card" href="products/oxo_steps/" aria-label="View Oxo Steps product page">
              <div class="product-image-wrap">
                <img src="images/oxo_steps_preview.png" alt="Oxo Steps plugin interface preview" loading="lazy">
              </div>
              <div class="product-meta">
                <div class="product-meta-head">
                  <img class="product-card-icon" src="images/oxo_steps_icon_1024.png" alt="" aria-hidden="true" loading="lazy">
                  <div class="product-meta-text">
                    <h3>Oxo Steps</h3>
                    <p>MIDI step sequencer / arpeggiator</p>
                  </div>
                </div>
              </div>
            </a>
          </div>
        </article>
      </section>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; <span id="year">2026</span> OXO-Music <span aria-hidden="true">&middot;</span> <a href="products/oxo_steps/privacy-policy.html">Privacy Policy</a></p>
    </div>
  </footer>

  <script src="assets/js/site.js"></script>
</body>
</html>
